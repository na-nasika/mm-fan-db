name: Update Data

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリの内容を取得
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 依存パッケージをインストール
        run: npm ci

      - name: ① 動画メタデータを取得
        run: node scripts/fetch-videos.js
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: ② スプシ用テンプレートを生成
        run: node scripts/export-for-sheet.js

      - name: ③ スプシ(overrides)の内容を取得
         run: node scripts/fetch-overrides.js
+      - name: ③' スプシ(カテゴリ設定)の内容を取得
+        run: node scripts/fetch-category-config.js
       - name: ④ 最終データを生成
         run: node scripts/merge-and-build.js

      - name: ⑤ 変更があればコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ src/data/
          git diff --staged --quiet && echo "変更なし" || (git commit -m "自動データ更新" && git push)

      - name: ⑥ サイトをビルド
        run: npm run build

      - name: ⑦ GitHub Pages用にアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: ⑧ GitHub Pagesへデプロイ
        uses: actions/deploy-pages@v4